<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta name="theme-color" content="#111827" />
  <title>Follow Up App</title>
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1>Follow Up</h1>
        <p id="todayText"></p>
      </div>
      <button id="addLeadTopBtn" class="primary-small" type="button">+ Lead</button>
    </header>

    <main>
      <section id="todayView" class="view active">
        <div class="section-title-row">
          <h2>Today & Overdue</h2>
          <span id="dueCount" class="badge">0</span>
        </div>
        <div id="todayList" class="list"></div>
      </section>

      <section id="leadsView" class="view">
        <div class="search-filter">
          <input id="searchInput" type="search" placeholder="Search leads..." />
          <select id="statusFilter">
            <option value="">All Contact Types</option>
            <option value="Attorney">Attorney</option>
            <option value="Buyer">Buyer</option>
            <option value="Contractor">Contractor</option>
            <option value="Private Lender">Private Lender</option>
            <option value="Realtor">Realtor</option>
            <option value="Seller Lead">Seller Lead</option>
            <option value="Title Company">Title Company</option>
            <option value="Wholesaler">Wholesaler</option>
          </select>
        </div>
        <div id="leadList" class="list"></div>
      </section>

      <section id="toolsView" class="view">
        <div class="section-title-row">
          <h2>Tools</h2>
        </div>
        <div class="card tools-card">
          <h3>Shared Database</h3>
          <p class="muted-text">This version syncs through Supabase.</p>
          <button id="refreshBtn" class="secondary-btn" type="button">Refresh From Supabase</button>
          <hr />
          <h3>Backup</h3>
          <button id="exportCsvBtn" class="primary" type="button">Export Leads CSV</button>
          <button id="exportJsonBtn" class="secondary-btn" type="button">Download Full Backup</button>
          <hr />
          <h3>Import Leads</h3>
          <input id="importFileInput" type="file" accept=".csv,.json" />
          <button id="importBtn" class="secondary-btn" type="button">Import Selected File</button>
          <hr />
          <h3>Danger Zone</h3>
          <button id="clearAllBtn" class="delete-btn" type="button">Clear All Leads From Supabase</button>
        </div>
      </section>

      <section id="formView" class="view">
        <div class="section-title-row">
          <h2 id="formTitle">Add Lead</h2>
          <button id="cancelFormBtn" class="ghost" type="button">Cancel</button>
        </div>
        <form id="leadForm" class="card form-card">
          <input type="hidden" id="leadId" />
          <label>Name<input id="name" type="text" placeholder="Seller name" /></label>
          <label>Phone<input id="phone" type="tel" placeholder="5551234567" /></label>
          <label>Email<input id="email" type="email" placeholder="seller@email.com" /></label>
          <label>Property Address<input id="propertyAddress" type="text" placeholder="123 Main St, City, ST" /></label>
          <label>Contact Type
            <select id="contactType">
              <option value="Attorney">Attorney</option>
              <option value="Buyer">Buyer</option>
              <option value="Contractor">Contractor</option>
              <option value="Private Lender">Private Lender</option>
              <option value="Realtor">Realtor</option>
              <option value="Seller Lead">Seller Lead</option>
              <option value="Title Company">Title Company</option>
              <option value="Wholesaler">Wholesaler</option>
            </select>
          </label>
          <label>Follow-Up Date<input id="followUpDate" type="date" /></label>
          <label>Notes<textarea id="notes" rows="6" placeholder="Conversation notes, motivation, next steps..."></textarea></label>
          <button type="submit" class="primary">Save Lead</button>
        </form>
      </section>

      <section id="detailView" class="view">
        <div class="section-title-row">
          <h2 id="detailName">Lead Detail</h2>
          <button id="backToLeadsBtn" class="ghost" type="button">Back</button>
        </div>
        <div id="detailCard" class="card"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button id="todayTab" class="nav-btn active" type="button">Today</button>
      <button id="leadsTab" class="nav-btn" type="button">Leads</button>
      <button id="toolsTab" class="nav-btn" type="button">Tools</button>
      <button id="addLeadBottomBtn" class="nav-btn add" type="button">Add</button>
    </nav>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
